<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Sign Up / Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-panel">
        <h1 class="game-title">FLAPPY BIRD</h1>
        <h2 class="form-title" id="paneTitle">CHOOSE AN OPTION</h2>

        <!-- Options (Sign Up / Login buttons) -->
        <div id="authOptions">
            <button id="signUpBtn" class="btn">SIGN UP</button>
            <button id="loginBtn" class="btn secondary">LOGIN</button>
            <button type="button" class="btn ghost" onclick="redirectBackToMenu()">BACK</button>
        </div>

        <!-- Sign-Up Form -->
        <div id="signUpForm" class="hidden">
            <div class="field">
                <label for="signUpUsername">USERNAME</label>
                <input type="text" id="signUpUsername" placeholder="3-20 characters" maxlength="20" autocomplete="username" />
                <div class="hint">LETTERS, NUMBERS AND UNDERSCORES.</div>
            </div>
            <div class="field">
                <label for="signUpPassword">PASSWORD</label>
                <input type="password" id="signUpPassword" placeholder="Min 6 characters" autocomplete="new-password" />
            </div>
            <div id="signUpStatus" class="status"></div>
            <button id="submitSignUp" class="btn">CREATE ACCOUNT</button>
            <button type="button" class="btn ghost" id="signupBack">BACK</button>
            <div class="switch-row">
                ALREADY HAVE AN ACCOUNT?
                <a id="switchToLogin">LOGIN</a>
            </div>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="hidden">
            <div class="field">
                <label for="loginUsername">USERNAME</label>
                <input type="text" id="loginUsername" placeholder="Your username" maxlength="20" autocomplete="username" />
            </div>
            <div class="field">
                <label for="loginPassword">PASSWORD</label>
                <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" />
            </div>
            <div id="loginStatus" class="status"></div>
            <button id="submitLogin" class="btn">LOGIN</button>
            <button type="button" class="btn ghost" id="loginBack">BACK</button>
            <div class="switch-row">
                NEW HERE?
                <a id="switchToSignup">CREATE ACCOUNT</a>
            </div>
        </div>
    </div>

    <script src="redirectFunc.js"></script>
    <script src="menu.js"></script>
</body>
</html>
